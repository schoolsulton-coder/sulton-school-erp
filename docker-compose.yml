services:
  postgres:
    image: postgres:16-alpine
    container_name: sulton_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sulton
      POSTGRES_PASSWORD: sulton
      POSTGRES_DB: sulton_school
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sulton_redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  # MinIO — S3-mos fayl saqlash (hujjatlar, surat, vazifa fayllari)
  minio:
    image: minio/minio:latest
    container_name: sulton_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sulton
      MINIO_ROOT_PASSWORD: sulton12345
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
