server {
    listen 80;
    server_name erp.sultonschool.uz;

    # Let's Encrypt (certbot) tekshiruvi uchun
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Backend API -> NestJS (127.0.0.1:4000, global prefix /api)
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20m;   # rasm (base64) yuklash uchun
        proxy_read_timeout 120s;
    }

    # Frontend -> Next.js (127.0.0.1:3005)
    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
