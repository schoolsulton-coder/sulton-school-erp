name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # qo'lda ham ishga tushirish mumkin

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push images (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Owner nomini kichik harflarga (GHCR talabi)
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: GHCR ga login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend image build & push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/sulton-backend:latest
            ghcr.io/${{ env.OWNER }}/sulton-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Frontend image build & push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=/api
          tags: |
            ghcr.io/${{ env.OWNER }}/sulton-frontend:latest
            ghcr.io/${{ env.OWNER }}/sulton-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: VPS ga deploy (SSH)
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Server sozlanganmi tekshirish
        id: check
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          if [ -n "$SSH_HOST" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SSH_HOST secret yo'q — VPS deploy o'tkazib yuborildi. Image'lar GHCR'da tayyor. Server qo'shsangiz SSH_HOST/SSH_USER/SSH_KEY secret'larini qo'shing."
          fi

      - name: Owner nomini kichik harflarga (image manzili uchun)
        if: steps.check.outputs.ready == 'true'
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: SSH orqali serverda yangilash
        if: steps.check.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: OWNER
          script: |
            set -e
            # CI aniqlagan to'g'ri (lowercase) image manzili + aniq sha tegi.
            # Bu qiymatlar .env dagi IMAGE_PREFIX/IMAGE_TAG dan ustun turadi.
            export IMAGE_PREFIX="ghcr.io/${OWNER}"
            export IMAGE_TAG="${{ github.sha }}"
            cd ${{ secrets.APP_DIR || '$HOME/sulton-school-erp' }}
            git pull --ff-only
            # GHCR private bo'lsa login kerak (public bo'lsa o'tkazib yuboriladi)
            if [ -n "${{ secrets.GHCR_PAT }}" ]; then
              echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            fi
            docker compose -f docker-compose.deploy.yml pull
            docker compose -f docker-compose.deploy.yml up -d
            docker image prune -f
