name: Deploy (VPS)

# main'ga push bo'lganda serverni avtomat yangilaydi (git pull + build + pm2 restart).
# Kerakli GitHub Secrets: SSH_HOST, SSH_USER, SSH_KEY (maxfiy kalit), SSH_PORT (ixtiyoriy).
# Server tomonida deploy public key /root/.ssh/authorized_keys da bo'lishi kerak.

on:
  push:
    branches: [main]
  workflow_dispatch: # qo'lda ham ishga tushirish mumkin

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -e
          if [ -z "$SSH_HOST" ]; then
            echo "::notice::SSH_HOST secret yo'q — deploy o'tkazib yuborildi."
            exit 0
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -i ~/.ssh/id_ed25519 -p "$PORT" -o StrictHostKeyChecking=no \
            "$SSH_USER@$SSH_HOST" 'bash -s' < deploy/remote-deploy.sh
